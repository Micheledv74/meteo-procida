<style>
html[data-th="dark"]{
  --bg:oklch(0.205 0.012 255); --bg2:oklch(0.17 0.012 255);
  --surface:oklch(0.245 0.013 255); --surface2:oklch(0.285 0.014 255);
  --line:oklch(0.345 0.014 255); --line-soft:oklch(0.30 0.013 255);
  --text:oklch(0.965 0.005 255); --text2:oklch(0.745 0.012 255); --text3:oklch(0.575 0.012 255);
  --accent:oklch(0.71 0.12 235);
  --accent-soft:color-mix(in srgb, var(--accent) 14%, transparent);
  --verde:oklch(0.75 0.15 152); --gialla:oklch(0.82 0.13 92);
  --arancione:oklch(0.73 0.15 55); --rossa:oklch(0.66 0.19 25);
}
html[data-th="light"]{
  --bg:oklch(0.97 0.005 255); --bg2:oklch(0.945 0.006 255);
  --surface:oklch(1 0 0); --surface2:oklch(0.982 0.004 255);
  --line:oklch(0.89 0.008 255); --line-soft:oklch(0.93 0.006 255);
  --text:oklch(0.28 0.013 258); --text2:oklch(0.46 0.013 258); --text3:oklch(0.605 0.012 258);
  --accent:oklch(0.55 0.14 248);
  --accent-soft:color-mix(in srgb, var(--accent) 12%, transparent);
  --verde:oklch(0.56 0.14 152); --gialla:oklch(0.66 0.13 78);
  --arancione:oklch(0.60 0.16 50); --rossa:oklch(0.54 0.20 27);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
@supports(padding:max(0px)){body{padding-bottom:env(safe-area-inset-bottom)}}
.wrap{max-width:1180px;margin:0 auto;padding:clamp(12px,3vw,26px)}
.mono{font-family:'IBM Plex Mono',monospace}
.micro{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:clamp(14px,2.5vw,20px)}
.card-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text2)}
section{margin-bottom:14px}

/* header */
.hdr{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:12px;flex:1 1 auto;min-width:0}
.mark{width:38px;height:38px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand h1{font-size:clamp(16px,3.4vw,20px);font-weight:700;letter-spacing:-.01em;line-height:1.1}
.brand .sub{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:2px}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.act{display:flex;align-items:center;gap:7px;padding:9px 13px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--text2);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.05em;cursor:pointer;transition:border-color .15s,color .15s}
.act:hover{border-color:var(--accent);color:var(--text)}
.act.icon{width:38px;height:38px;padding:0;justify-content:center;flex-shrink:0}

/* alert */
.alert{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 14px;border-radius:11px;background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--sev)}
.badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;padding:4px 10px;border-radius:6px;color:#fff;background:var(--sev)}
.alert-txt{font-size:13.5px;color:var(--text2);flex:1 1 auto;min-width:0}
.alert-mare{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}

/* hero */
.hero{display:flex;flex-wrap:wrap;gap:14px}
.cur{flex:1 1 320px}
.dep{flex:1.5 1 380px}
.card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px}
.cur-main{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.cur-temp{font-family:'IBM Plex Mono',monospace;font-size:clamp(40px,9vw,58px);font-weight:600;line-height:.95;letter-spacing:-.02em}
.cur-cond{font-size:15px;color:var(--text2);margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:9px}
.stat{background:var(--surface2);border:1px solid var(--line-soft);border-radius:9px;padding:9px 10px}
.stat-l{font-family:'IBM Plex Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.stat-v{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;margin-top:3px}
.stat-v small{font-size:10px;color:var(--text3);font-weight:500}

/* departures */
.live{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3)}
.live .pulse{width:7px;height:7px;border-radius:50%;background:var(--verde);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.feat{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:12px;background:var(--accent-soft);border:1px solid var(--line);margin-bottom:14px}
.feat-l{flex:1 1 auto;min-width:0}
.feat-dir{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feat-row{display:flex;align-items:baseline;gap:9px;margin-top:5px}
.feat-time{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;letter-spacing:-.01em}
.feat-sub{font-size:11.5px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.feat-r{text-align:right;flex-shrink:0}
.feat-big{font-family:'IBM Plex Mono',monospace;font-size:clamp(22px,5vw,32px);font-weight:600;color:var(--accent);line-height:1;white-space:nowrap}
.feat-big-l{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:3px}
.cols{display:flex;flex-wrap:wrap;gap:18px}
.col{flex:1 1 210px;min-width:0}
.col-h{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding-bottom:6px;border-bottom:1px solid var(--line)}
.drow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--sev)}
.dtime{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;min-width:48px}
.dlabel{flex:1;min-width:0;font-size:11.5px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dcount{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);white-space:nowrap}

/* commute */
.card-h2{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.chip{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--line)}
.cgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-bottom:12px}
.cloc{background:var(--surface2);border:1px solid var(--line-soft);border-radius:10px;padding:12px 14px}
.cloc.p{border-left:3px solid var(--accent)}
.cloc.n{border-left:3px solid var(--text3)}
.cloc-h{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.cstats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.cs-l{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--text3)}
.cs-v{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;margin-top:2px}
.cs-v.warn{color:var(--gialla)}
.cs-v.adv{font-family:'IBM Plex Sans';font-size:11px;color:var(--text2)}
.cnote{display:flex;gap:10px;align-items:flex-start;padding:11px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--line-soft);font-size:13px;line-height:1.5;color:var(--text2)}

/* seven days */
.fc-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px}
.fc{flex:1 0 86px;min-width:86px;background:var(--surface2);border:1px solid var(--line-soft);border-radius:10px;overflow:hidden}
.fc-bar{height:4px;background:var(--sev)}
.fc-body{padding:10px 8px;text-align:center}
.fc-max{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;margin-top:7px}
.fc-min{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text3)}
.fc-hr{height:1px;background:var(--line-soft);margin:9px 0}
.fc-wave{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text2)}
.fc-wind{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3)}
.segs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.seg{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:.04em;padding:7px 13px;border-radius:8px;cursor:pointer;background:var(--surface2);color:var(--text2);border:1px solid var(--line);transition:all .15s}
.seg.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chart-box{position:relative;height:clamp(190px,34vw,280px)}
.chart-cap{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:var(--text3);text-align:center;margin-top:10px}

/* timetable */
.legend{display:flex;gap:14px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--text3)}
.legend span{display:flex;align-items:center;gap:5px}
.ldot{width:8px;height:8px;border-radius:50%}
.tt-h{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:9px;border-left:3px solid var(--accent);padding-left:9px}
.tt-h.n{border-left-color:var(--text3)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.chip-t{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface2);border:1px solid var(--line-soft);border-left:3px solid var(--sev);border-radius:8px}
.chip-t.past{opacity:.42}
.chip-time{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600}
.chip-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text3)}
.chip-ok{color:var(--verde);font-size:12px}
.links{display:flex;gap:10px;flex-wrap:wrap}
.lnk{flex:1 1 200px;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:10px;text-decoration:none;font-weight:600;font-size:13px}
.lnk.primary{background:var(--accent);color:#fff}
.lnk.ghost{background:var(--surface2);border:1px solid var(--line);color:var(--text2)}
.ft{padding:14px 4px 6px;text-align:center}
.ft .src{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:var(--text3);line-height:1.7}
.ft .dis{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--text3);opacity:.7;margin-top:4px}
.tap-hint{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.03em;color:var(--text3);margin:-2px 0 14px}
.chip-t{cursor:pointer;font-family:inherit;color:var(--text);text-align:left}
.chip-t .star{font-size:13px;color:var(--text3);line-height:1}
.chip-t.pinned{border-color:var(--accent);background:var(--accent-soft)}
.chip-t.pinned .star{color:var(--accent)}
.pinrows{margin-top:2px}
.pinrows .drow{gap:9px}
.pinrows .drow b{color:var(--text);font-weight:700;font-family:'IBM Plex Mono',monospace}
.unpin{margin-left:2px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;padding:3px 5px;border-radius:6px;flex-shrink:0}
.unpin:hover{color:var(--rossa);background:var(--surface2)}
.pinhint,.emptyhint{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.03em;color:var(--text3);text-align:center;margin-top:12px;line-height:1.5}
.emptyhint{padding:14px;border:1px dashed var(--line);border-radius:10px;background:var(--surface2)}
::-webkit-scrollbar{height:7px;width:7px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
</style>
</head>

  function currentReading(d0){

       '<div class="cgrid">'+
       '<div class="cloc p"><div class="cloc-h">Procida · partenza</div><div class="cstats">'+cs('Temp',pTemp+'°')+cs('Pioggia',pRain+'%')+cs('Vento',pWind)+cs('Onde',pWave+'m')+'</div></div>'+
       '<div class="cloc n"><div class="cloc-h">Napoli · arrivo (stima)</div><div class="cstats">'+cs('Temp',nTemp+'°')+cs('Pioggia',nRain+'%',nRain>40?'warn':'')+cs('Vento',nWind)+csAdv('Consiglio',advice)+'</div></div>'+
       '</div><div class="cnote">'+ICON.bulb+'<span>'+note+'</span></div></section>';

    h+='<section class="card"><div class="card-title" style="margin-bottom:14px">Andamento 7 giorni</div>'+
       '<div class="fc-strip">'+fcStrip()+'</div>'+
       '<div class="segs" id="mpSegs">'+segsHtml()+'</div>'+
       '<div class="chart-box"><canvas id="mpChart"></canvas></div>'+
       '<div class="chart-cap" id="mpCap">'+CAP[STATE.metric]+'</div></section>';

    h+='<section class="card"><div class="card-h2"><span class="card-title">Orari traghetti · oggi</span><span class="legend"><span><span class="ldot" style="background:var(--verde)"></span>Regolare</span><span><span class="ldot" style="background:var(--gialla)"></span>Ritardi</span><span><span class="ldot" style="background:var(--rossa)"></span>Sospeso</span></span></div>'+
       '<div class="tap-hint">★ Tocca un orario per seguirlo con il conto alla rovescia in alto</div>'+
       '<div class="tt-h">Procida → Napoli</div><div class="chips" id="mpChipsP">'+chips(PN,'P')+'</div>'+
       '<div class="tt-h n">Napoli → Procida</div><div class="chips" id="mpChipsN">'+chips(NP,'N')+'</div>'+
       '<div class="links"><a class="lnk primary" target="_blank" rel="noopener" href="https://shop.caremar.it/it/prossime-partenze/">Orari ufficiali Caremar →</a><a class="lnk ghost" target="_blank" rel="noopener" href="https://www.traghetti-ischia.info/">Traghetti Ischia Info →</a></div></section>';

    h+='<footer class="ft"><div class="src">Dati: Open-Meteo · Marine forecast · Caremar / SNAV / Medmar · Generato '+genTxt+' via n8n</div><div class="dis">Gli orari mostrati sono indicativi: verifica sempre le fonti ufficiali prima di partire.</div></footer>';

    document.getElementById('app').innerHTML=h;
  }
  function stat(l,v,u){ return '<div class="stat"><div class="stat-l">'+l+'</div><div class="stat-v mono">'+v+(u?' <small>'+u+'</small>':'')+'</div></div>'; }
  function cs(l,v,cls){ return '<div><div class="cs-l">'+l+'</div><div class="cs-v mono'+(cls?' '+cls:'')+'">'+v+'</div></div>'; }
  function csAdv(l,v){ return '<div><div class="cs-l">'+l+'</div><div class="cs-v adv">'+v+'</div></div>'; }

  function mpRenderChart(){
    if(!window.Chart) return;
    var cv=document.getElementById('mpChart'); if(!cv) return;
    if(MP_CHART){ MP_CHART.destroy(); MP_CHART=null; }
    var dark=document.documentElement.getAttribute('data-th')==='dark';
    var grid=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
    var tk=dark?'rgba(235,238,245,0.55)':'rgba(20,24,32,0.5)';
    var ds=daily.slice(0,7), labels=ds.map(function(d){return dayLabel(d.date);});
    var m=STATE.metric, type='line', sets=[]; var mono={family:'IBM Plex Mono'};
    if(m==='temp'){ sets=[{label:'Max °C',data:ds.map(function(d){return d.temp_max;}),borderColor:'#F2994A',backgroundColor:'rgba(242,153,74,0.12)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#F2994A'},{label:'Min °C',data:ds.map(function(d){return d.temp_min;}),borderColor:'#4A90E2',fill:false,tension:.4,pointRadius:4,pointBackgroundColor:'#4A90E2',borderDash:[5,4]}]; }
    else if(m==='wave'){ sets=[{label:'Onde m',data:ds.map(function(d){return d.wave_height_max;}),borderColor:'#2B9FB3',backgroundColor:'rgba(43,159,179,0.15)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#2B9FB3'}]; }
    else if(m==='wind'){ type='bar'; sets=[{type:'bar',label:'Vento km/h',data:ds.map(function(d){return d.wind_speed_max;}),backgroundColor:'#5B8DEF',borderRadius:6,order:2},{type:'line',label:'Raffiche km/h',data:ds.map(function(d){return d.wind_gusts_max;}),borderColor:'#F2994A',tension:.4,pointRadius:3,order:1}]; }
    else if(m==='rain'){ type='bar'; sets=[{label:'Pioggia mm',data:ds.map(function(d){return d.precipitation_sum||0;}),backgroundColor:'#6C7BE0',borderRadius:6}]; }
    else if(m==='press'){ sets=[{label:'Pressione hPa',data:ds.map(function(d){var a=d.hourly&&d.hourly.pressure; if(!a||!a.length)return null; var s=0; for(var i=0;i<a.length;i++)s+=a[i]; return Math.round(s/a.length*10)/10;}),borderColor:'#2BB58B',backgroundColor:'rgba(43,181,139,0.12)',fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#2BB58B',spanGaps:true}]; }
    MP_CHART=new Chart(cv,{type:type,data:{labels:labels,datasets:sets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:sets.length>1,labels:{color:tk,font:{family:'IBM Plex Mono',size:11},boxWidth:12,boxHeight:12,usePointStyle:true}},tooltip:{titleFont:mono,bodyFont:mono}},scales:{y:{grid:{color:grid},ticks:{color:tk,font:{family:'IBM Plex Mono',size:10}},beginAtZero:(m==='rain'||m==='wind')},x:{grid:{display:false},ticks:{color:tk,font:{family:'IBM Plex Mono',size:9}}}}}});
  }

  window.mpTogglePin=function(dir,time){ var k=dir+'|'+time, i=PINNED.indexOf(k); if(i>-1) PINNED.splice(i,1); else PINNED.push(k); savePinned(); var d=document.getElementById('mpDep'); if(d) d.innerHTML=renderDepInner(); var cp=document.getElementById('mpChipsP'); if(cp) cp.innerHTML=chips(PN,'P'); var cn=document.getElementById('mpChipsN'); if(cn) cn.innerHTML=chips(NP,'N'); };
  window.mpSetMetric=function(k){ STATE.metric=k; var sg=document.getElementById('mpSegs'); if(sg) sg.innerHTML=segsHtml(); var cp=document.getElementById('mpCap'); if(cp) cp.textContent=CAP[k]; mpRenderChart(); };
  window.mpToggleTheme=function(){ var el=document.documentElement; var t=el.getAttribute('data-th')==='dark'?'light':'dark'; el.setAttribute('data-th',t); try{ localStorage.setItem('mp-theme',t); }catch(e){} var b=document.getElementById('mpTheme'); if(b) b.innerHTML=(t==='dark'?ICON.sun:ICON.moon); var mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content', t==='dark'?'#1a1d23':'#f3f4f6'); mpRenderChart(); };

  try{ var saved=localStorage.getItem('mp-theme'); if(saved) document.documentElement.setAttribute('data-th',saved); }catch(e){}
  render();
  (function waitChart(n){ if(window.Chart){ mpRenderChart(); } else if(n<120){ setTimeout(function(){waitChart(n+1);},80); } })(0);
  setInterval(function(){ var el=document.getElementById('mpDep'); if(el) el.innerHTML=renderDepInner(); }, 1000);
})();
</script>
